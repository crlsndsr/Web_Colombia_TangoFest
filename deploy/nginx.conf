# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name colombiatangofestival.com www.colombiatangofestival.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name colombiatangofestival.com www.colombiatangofestival.com;

    ssl_certificate     /etc/letsencrypt/live/colombiatangofestival.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/colombiatangofestival.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # Static assets served directly by Nginx with long-lived cache
    root /var/www/colombia-tango-fest/dist/client;

    location ~* \.(webp|jpg|jpeg|png|gif|svg|ico|woff|woff2|ttf|css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri @node;
    }

    location / {
        try_files $uri @node;
    }

    # Proxy dynamic routes and API to the Node.js process
    location @node {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
